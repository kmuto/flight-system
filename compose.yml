services:
  # --- バックエンド: Laravel ---
  backend:
    build: ./backend
    # Rancher+macOSの場合、ホストとコンテナの時刻が大きくずれることがある
    # そのため、ここでは時刻を強制的に変更できる権限を与えている。以下で強制調整可能
    # docker compose exec -u 0 backend date -s "@$(date +%s.%N)"
    privileged: true
    container_name: flight-backend
    volumes:
      - ./backend:/var/www/html
    environment:
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_SERVICE_NAME=flight-backend-api
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DB_HOST=mysql
      - DB_DATABASE=flight_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
    command: php -S 0.0.0.0:8010 -t public

  # --- データベース: MariaDB (MySQL見立て) ---
  mysql:
    image: mariadb:12.2
    container_name: flight-db
    environment:
      - MYSQL_DATABASE=flight_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=root_password

  # --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: otel-collector
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    command: ["--config=/etc/otel-config.yaml"]
    ports:
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - MACKEREL_APIKEY

  # --- Jaeger (可視化ツール) ---
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # UI用

  # --- フロントエンド: Node.js ---
  frontend:
    build: ./frontend
    container_name: flight-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true # Windows/WSL2などでホットリロードが効かない場合の対策
    depends_on:
      - backend
